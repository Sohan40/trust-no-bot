name: Codex Task
description: Implementation task for this repo
labels: [codex]
body:
  - type: textarea
    id: goal
    attributes:
      label: Goal
      description: What should be implemented?
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Context
      description: Link relevant docs and explain why this matters.
    validations:
      required: true
  - type: textarea
    id: files
    attributes:
      label: Files likely involved
      description: List expected files or folders.
    validations:
      required: false
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: What must be true when this is done?
    validations:
      required: true
  - type: textarea
    id: out_of_scope
    attributes:
      label: Out of scope
      description: What should not be implemented in this task?
    validations:
      required: true
  - type: textarea
    id: testing
    attributes:
      label: Testing checklist
      description: Commands or manual checks.
    validations:
      required: false